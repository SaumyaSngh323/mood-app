<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in Aesthetic</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">
    
    <style>
        /* CSS STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.6s; }

        body {
            font-family: 'Poppins', sans-serif;
            /* Using a high-quality aesthetic flower/mosaic background */
            background: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            padding: 15px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .navbar button {
            background: none;
            border: none;
            color: white;
            margin: 0 15px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Page System */
        .page {
            display: none; /* Hidden by default */
            width: 400px;
            animation: fadeIn 0.8s ease;
        }

        .active {
            display: block; /* Shown when active */
        }

        /* Glass Container */
        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 35px; margin-bottom: 10px; }

        .mood-btns button {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Mood Filter Effects */
        .soft-mode { backdrop-filter: brightness(1.2) sepia(0.2); }
        .classy-mode { backdrop-filter: grayscale(1) contrast(1.2); }
        .lively-mode { backdrop-filter: saturate(2.5); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('goals')">Goals</button>
        <button onclick="showPage('weather')">Weather</button>
    </nav>

    <div id="home" class="page active">
        <div class="glass-box">
            <h1>Lively Space ✨</h1>
            <p id="status">Pick your energy...</p>
            <div class="mood-btns">
                <button onclick="changeVibe('soft')">Soft</button>
                <button onclick="changeVibe('classy')">Classy</button>
                <button onclick="changeVibe('lively')">Lively</button>
            </div>
            <br>
            <input type="text" id="chatInput" placeholder="Talk to me..." style="background:none; border:none; border-bottom:1px solid white; color:white; padding:5px; width:80%;">
            <button onclick="talk()" style="background:white; color:black; border-radius:10px; border:none; padding:5px 10px; margin-top:10px;">Send</button>
            <p id="reply" style="margin-top:10px; font-size:12px;"></p>
        </div>
    </div>

    <div id="goals" class="page">
        <div class="glass-box">
            <h1>Future Plans ✈️</h1>
            <p style="margin: 10px 0;">• Study Abroad 2027</p>
            <p>• Premium Web Designer</p>
        </div>
    </div>

    <div id="weather" class="page">
        <div class="glass-box">
            <h1>Weather ☁️</h1>
            <h2>24°C</h2>
            <p>Classy Breeze</p>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        function showPage(pageId) {
            // Hide all pages
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active'));

            // Show selected page
            document.getElementById(pageId).classList.add('active');
        }

        function changeVibe(vibe) {
            const body = document.body;
            body.className = ''; // Reset
            
            if(vibe === 'soft') body.classList.add('soft-mode');
            if(vibe === 'classy') body.classList.add('classy-mode');
            if(vibe === 'lively') body.classList.add('lively-mode');
            
            document.getElementById('status').innerText = vibe.toUpperCase() + " Energy Activated.";
        }

        function talk() {
            const val = document.getElementById('chatInput').value;
            if(val) {
                document.getElementById('reply').innerText = "I hear you. Stay aesthetic... 🎧";
                document.getElementById('chatInput').value = "";
            }
        }
    </script>

</body>
</html>
