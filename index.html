<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MY Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; background-attachment: fixed; transition: 0.8s; padding: 20px; }
        
        /* THEMES - SAVED AS YOU REQUESTED */
        body.cute-mode { background-image: url('https://images.unsplash.com/photo-1592194996308-7b43878e84a6?q=80&w=2574&auto=format&fit=crop'); color: #ff69b4; }
        body.classy-mode { background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2670&auto=format&fit=crop'); color: #d4af37; }
        body.dark-mode { background-image: url('https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=2670&auto=format&fit=crop'); color: #ffffff; }

        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.3); padding: 30px; width: 100%; max-width: 850px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        .widget-box { background: rgba(255, 255, 255, 0.15); padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 10px; }
        input, textarea, input[type="number"] { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px; color: inherit; font-family: inherit; outline: none; margin-bottom: 5px; }
        .btn { padding: 10px; border-radius: 50px; border: 1px solid currentColor; background: transparent; color: inherit; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; margin-top: 5px; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        
        #diaryList, #goalList { max-height: 100px; overflow-y: auto; margin-top: 10px; text-align: left; scrollbar-width: thin; }
        .diary-entry { font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; }
        
        @media (max-width: 700px) { .glass-card { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="mainBody" class="cute-mode">

    <div class="glass-card">
        <div class="left-panel">
            <div class="widget-box">
                <h2 id="time">00:00:00</h2>
                <p>London: <span id="london">00:00</span></p>
                <p>March 26, 2026</p>
            </div>
            
            <div class="widget-box">
                <h2>📔 Digital Diary</h2>
                <textarea id="diary" placeholder="Save a memory..."></textarea>
                <button class="btn" onclick="saveDiary()">Save Entry</button>
                <div id="diaryList"></div> </div>
            
            <div class="widget-box">
                <h2>🎯 Focus Timer</h2>
                <input type="number" id="focusTime" value="25" style="width: 70px;"> mins
                <div id="timerDisplay" style="font-size: 1.5rem; font-weight: 600; margin-top: 5px;">25:00</div>
                <button class="btn" id="timerBtn" onclick="toggleTimer()">Start Focus</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="widget-box">
                <h2>🌡️ Delhi: 28°C</h2>
                <div style="display:flex; gap:5px;">
                    <button class="btn" onclick="setTheme('cute')">Cute</button>
                    <button class="btn" onclick="setTheme('classy')">Classy</button>
                    <button class="btn" onclick="setTheme('dark')">Dark</button>
                </div>
            </div>
            
            <div class="widget-box">
                <h2>🎵 Music System</h2>
                <input type="text" id="moodInput" placeholder="Type cute, classy, or dark...">
                <div style="display:flex; gap:5px;">
                    <button class="btn" onclick="handleMood()">Play</button>
                    <button class="btn" style="border-color: #ff4d4d; color: #ff4d4d;" onclick="stopMusic()">Stop</button>
                </div>
                <p id="musicStatus" style="font-size: 0.7rem; margin-top: 5px; opacity: 0.8;"></p>
            </div>
            
            <div class="widget-box">
                <h2>✅ My Goals</h2>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="newGoal" placeholder="Add goal...">
                    <button class="btn" style="width:40px; margin:0;" onclick="addGoal()">+</button>
                </div>
                <div id="goalList"></div>
                <button class="btn" style="font-size: 0.7rem; padding: 5px;" onclick="clearGoals()">Clear All</button>
            </div>
        </div>
    </div>

    <script>
        // LIVE CLOCKS
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            document.getElementById('london').innerText = new Date().toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function setTheme(type) { document.getElementById('mainBody').className = type + '-mode'; }

        // MUSIC LOGIC
        let audio;
        function handleMood() {
            const val = document.getElementById('moodInput').value.toLowerCase();
            const status = document.getElementById('musicStatus');
            if(audio) { audio.pause(); audio.currentTime = 0; }

            let file = "";
            if(val.includes("cute")) { file = "cute.mp3"; setTheme('cute'); }
            else if(val.includes("classy")) { file = "classy.mp3"; setTheme('classy'); }
            else if(val.includes("dark")) { file = "dark.mp3"; setTheme('dark'); }

            if(file) {
                audio = new Audio(file);
                audio.play().catch(() => { status.innerText = "⚠️ Tap screen first!"; });
                status.innerText = "Playing: " + file;
            }
        }

        function stopMusic() {
            if(audio) { audio.pause(); audio.currentTime = 0; document.getElementById('musicStatus').innerText = "Music Stopped"; }
        }

        // DIARY LOGIC (NEW HISTORY FEATURE)
        function saveDiary() { 
            const entry = document.getElementById('diary').value;
            if(!entry) return;
            let history = JSON.parse(localStorage.getItem('diaryHistory')) || [];
            const timeStamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            history.unshift(timeStamp + ": " + entry);
            localStorage.setItem('diaryHistory', JSON.stringify(history));
            document.getElementById('diary').value = '';
            showHistory();
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem('diaryHistory')) || [];
            document.getElementById('diaryList').innerHTML = history.map(item => `<div class="diary-entry">${item}</div>`).join('');
        }

        // GOALS LOGIC
        function addGoal() {
            const g = document.getElementById('newGoal').value;
            if(!g) return;
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            div.innerHTML = `<input type="checkbox"> <span>${g}</span>`;
            document.getElementById('goalList').appendChild(div);
            document.getElementById('newGoal').value = '';
        }
        function clearGoals() { document.getElementById('goalList').innerHTML = ''; }

        // TIMER LOGIC
        let countdown;
        function toggleTimer() {
            let s = document.getElementById('focusTime').value * 60;
            const btn = document.getElementById('timerBtn');
            const display = document.getElementById('timerDisplay');
            if(btn.innerText === "Start Focus") {
                clearInterval(countdown);
                btn.innerText = "Stop";
                countdown = setInterval(() => {
                    s--;
                    display.innerText = Math.floor(s/60) + ":" + (s%60 < 10 ? '0' : '') + (s%60);
                    if(s <= 0) { clearInterval(countdown); alert("Done!"); btn.innerText = "Start Focus"; }
                }, 1000);
            } else {
                clearInterval(countdown);
                btn.innerText = "Start Focus";
                display.innerText = document.getElementById('focusTime').value + ":00";
            }
        }

        // LOAD SAVED DATA ON OPEN
        window.onload = () => { showHistory(); }
    </script>
</body>
</html>
