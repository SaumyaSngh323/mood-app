<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwitiya's Personal Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.8s ease-in-out;
        }

        /* THEME BACKGROUNDS */
        body.cute-mode { 
            background-image: url('https://images.unsplash.com/photo-1592194996308-7b43878e84a6?q=80&w=2574&auto=format&fit=crop'); /* 3D Style Kitty Vibe */
            color: #ff69b4;
        }
        body.classy-mode { 
            background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2670&auto=format&fit=crop'); 
            color: #d4af37;
        }
        body.dark-mode { 
            background-image: url('https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=2670&auto=format&fit=crop'); /* Your Original Dark 3D Geometry */
            color: #ffffff;
        }

        /* 3D GLASS CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 50px 100px rgba(0,0,0,0.4);
            padding: 30px;
            width: 95%; max-width: 800px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            transform: perspective(1000px) rotateX(1deg);
        }

        /* WIDGETS */
        .widget-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 10px;
        }

        h2 { font-size: 1.2rem; margin-bottom: 10px; }
        
        textarea {
            width: 100%; height: 100px; background: rgba(0,0,0,0.1);
            border: none; border-radius: 15px; padding: 10px; color: inherit;
            resize: none; font-family: inherit;
        }

        .btn {
            padding: 10px; border-radius: 50px; border: 1px solid currentColor;
            background: transparent; color: inherit; cursor: pointer; font-weight: 600;
            width: 100%; margin-top: 5px;
        }

        input {
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: inherit; outline: none;
        }

        iframe { border-radius: 15px; width: 100%; height: 80px; margin-top: 10px; }

        @media (max-width: 600px) { .glass-card { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="mainBody" class="cute-mode">

    <div class="glass-card">
        <div class="left-panel">
            <div class="widget-box">
                <h2>🕒 <span id="time">00:00:00</span></h2>
                <p>📅 <span id="date">Loading...</span></p>
                <p>🌍 London: <span id="london">00:00</span></p>
            </div>

            <div class="widget-box">
                <h2>📔 Digital Diary</h2>
                <textarea id="diary" placeholder="How was your day? Write here..."></textarea>
                <button class="btn" onclick="saveDiary()">Save to Memory</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="widget-box">
                <h2>🌡️ Weather: 28°C (Delhi)</h2>
                <div class="theme-selector" style="display:flex; gap:5px; margin-top:5px;">
                    <button class="btn" onclick="setTheme('cute')">Cute</button>
                    <button class="btn" onclick="setTheme('classy')">Classy</button>
                    <button class="btn" onclick="setTheme('dark')">Dark</button>
                </div>
            </div>

            <div class="widget-box">
                <h2>🎵 Music System</h2>
                <input type="text" id="moodInput" placeholder="Enter vibe (e.g. Taylor)...">
                <button class="btn" onclick="handleMood()">Set Mood</button>
                <div id="musicPlayer"></div>
            </div>
        </div>
    </div>

    <script>
        // CLOCK & DATE
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toDateString();
            document.getElementById('london').innerText = new Date().toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // THEMES
        function setTheme(type) {
            const body = document.getElementById('mainBody');
            body.className = type + '-mode';
        }

        // MOOD & MUSIC LOGIC
        function handleMood() {
            const val = document.getElementById('moodInput').value.toLowerCase();
            const player = document.getElementById('musicPlayer');
            
            if(val.includes("cute") || val.includes("taylor")) {
                setTheme('cute');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/1BxfuRmsmsOeoFLvC7L61S" frameBorder="0" allow="encrypted-media"></iframe>`;
            } else if(val.includes("classy") || val.includes("ed")) {
                setTheme('classy');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/0tgVpS3mghpBozvYvRPS6u" frameBorder="0" allow="encrypted-media"></iframe>`;
            } else if(val.includes("dark") || val.includes("arijit")) {
                setTheme('dark');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/5z9S9u0VvVfB4Wd9tPto2n" frameBorder="0" allow="encrypted-media"></iframe>`;
            }
        }

        // DIARY SAVE
        function saveDiary() {
            const text = document.getElementById('diary').value;
            localStorage.setItem('userDiary', text);
            alert("Entry saved in your browser!");
        }

        // Load diary on startup
        window.onload = () => {
            document.getElementById('diary').value = localStorage.getItem('userDiary') || "";
        }
    </script>
</body>
</html>
