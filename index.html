<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lively Moods | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
        }

        /* --- MESMERIZING 3D PREMIUM BACKGROUNDS --- */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transform: scale(1.05);
        }

        /* Cute: 3D Aesthetic Pink Silk/Flowers */
        body.cute-theme .bg-layer { 
            background-image: url('https://images.unsplash.com/photo-1518131359043-409fde1fa9e3?q=80&w=2000&auto=format&fit=crop'); 
            filter: saturate(1.3) brightness(0.9);
        }
        body.cute-theme { color: #3d1c1c; }
        body.cute-theme .glass-box { background: rgba(255, 230, 235, 0.4); border-color: rgba(255, 255, 255, 0.7); }

        /* Classy: 3D Premium Gold Architecture/Silk */
        body.classy-theme .bg-layer { 
            background-image: url('https://images.unsplash.com/photo-1513519245088-0e12902e35ca?q=80&w=2000&auto=format&fit=crop'); 
        }
        body.classy-theme { color: #2c241e; }
        body.classy-theme .glass-box { background: rgba(255, 255, 255, 0.25); border-color: rgba(212, 175, 55, 0.5); }

        /* Dark: Mesmerizing Midnight 3D Galaxy/Abstract */
        body.dark-theme .bg-layer { 
            background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2000&auto=format&fit=crop'); 
        }
        body.dark-theme { color: #f0f0f0; }
        body.dark-theme .glass-box { background: rgba(0, 0, 0, 0.5); border-color: rgba(255, 255, 255, 0.1); }

        /* Navbar: Minimalist & Classy */
        .navbar {
            position: fixed; top: 0; width: 100%; padding: 40px;
            display: flex; justify-content: center; gap: 50px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); z-index: 1000;
        }
        .navbar button { background: none; border: none; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 22px; color: inherit; font-style: italic; letter-spacing: 2px; }
        .navbar button:hover { transform: scale(1.1); text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* Premium Glass Container */
        .page { display: none; width: 550px; perspective: 1500px; }
        .active { display: block; animation: zoomIn 1.2s ease; }

        .glass-box {
            backdrop-filter: blur(50px); padding: 60px; border-radius: 60px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 50px 120px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 50px; margin-bottom: 30px; letter-spacing: -1px; }

        /* Aesthetic Mood Buttons */
        .mood-btn {
            padding: 15px 30px; margin: 10px; border-radius: 40px; border: 1px solid currentColor;
            background: rgba(255,255,255,0.05); color: inherit; cursor: pointer; font-weight: 600; font-size: 14px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .mood-btn:hover { background: white; color: black; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Aesthetic Chat */
        .chat-input {
            width: 80%; padding: 18px; background: none; border: none;
            border-bottom: 2px solid currentColor; color: inherit; outline: none; margin-top: 40px; font-size: 20px; text-align: center; font-style: italic;
        }

        /* Aesthetic Diary Area */
        .diary-paper {
            width: 100%; height: 250px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; color: inherit;
            padding: 25px; font-size: 22px; line-height: 1.6;
            font-family: 'Cormorant Garamond', serif; outline: none; resize: none;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        /* Song List Appearance */
        .playlist-scroll {
            max-height: 180px; overflow-y: auto; margin-top: 30px; text-align: left; display: none;
        }
        .song-card {
            padding: 15px; margin-bottom: 10px; border-radius: 20px;
            background: rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;
        }

        /* Player Bar */
        .player-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); 
            padding: 25px; color: white; text-align: center; backdrop-filter: blur(20px);
        }
        audio { width: 70%; height: 35px; filter: invert(1); margin-top: 10px; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="cute-theme">

    <div class="bg-layer"></div>

    <nav class="navbar">
        <button onclick="showPage('home')">Home 🌸</button>
        <button onclick="showPage('weather-page')">Forecast ☁️</button>
        <button onclick="showPage('diary-page')">Diary ✍️</button>
    </nav>

    <div id="home" class="page active">
        <div class="glass-box">
            <h1>Lively Moods</h1>
            <div class="mood-btns">
                <button class="mood-btn" onclick="setTheme('cute')">Pink Petals</button>
                <button class="mood-btn" onclick="setTheme('classy')">Premium Silk</button>
                <button class="mood-btn" onclick="setTheme('dark')">Midnight Sky</button>
            </div>
            
            <input type="text" id="chatInput" class="chat-input" placeholder="Whisper 'hii' for music...">
            <button onclick="handleChat()" style="margin-top:20px; padding:12px 35px; border-radius:30px; cursor:pointer; background:currentColor; color:white; border:none; font-weight:bold;">Enter</button>
            
            <div id="playlist" class="playlist-scroll">
                <div class="song-card" onclick="playSong('Style - Taylor Swift', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">
                    <span>Taylor Swift - Style</span> <a href="https://www.youtube.com/watch?v=-CmadmM5cOk" target="_blank" style="color:red; text-decoration:none; font-size:10px; font-weight:bold;">YT</a>
                </div>
                <div class="song-card" onclick="playSong('Perfect - Ed Sheeran', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3')">
                    <span>Ed Sheeran - Perfect</span> <a href="https://www.youtube.com/watch?v=2Vv-BfVoq4g" target="_blank" style="color:red; text-decoration:none; font-size:10px; font-weight:bold;">YT</a>
                </div>
            </div>
        </div>
    </div>

    <div id="weather-page" class="page">
        <div class="glass-box">
            <h1 style="font-size:35px;">Lucknow Forecast</h1>
            <h2 id="clock" style="margin-bottom:30px; letter-spacing:5px;"></h2>
            <div style="display:grid; grid-template-columns:1fr; gap:20px; text-align:left;">
                <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:30px;">
                    <b>Currently in Lucknow:</b> Summer Bliss<br>🌡️ 34°C | Clear Skies ☀️
                </div>
                <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:30px;">
                    <b>Global Vibe:</b> Mesmerizing Breeze<br>🌬️ Classy Winds
                </div>
            </div>
        </div>
    </div>

    <div id="diary-page" class="page">
        <div class="glass-box">
            <h1>Dear Heart...</h1>
            <p style="margin-bottom:15px; font-style:italic;">How was your day spent?</p>
            <textarea id="diaryInput" class="diary-paper" placeholder="Start typing your story..."></textarea>
            <button onclick="alert('Your soul is saved. ✨')" style="margin-top:25px; background:currentColor; color:white; border:none; padding:15px 40px; border-radius:40px; cursor:pointer; font-weight:bold;">Seal Memory</button>
        </div>
    </div>

    <div class="player-bar">
        <span id="nowPlaying">Choose a vibe to listen...</span><br>
        <audio id="mainAudio" controls></audio>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setTheme(theme) {
            document.body.className = theme + '-theme';
        }

        function handleChat() {
            const input = document.getElementById('chatInput').value.toLowerCase();
            const list = document.getElementById('playlist');
            if (input.includes('hii')) {
                list.style.display = "block";
            }
        }

        function playSong(name, url) {
            const audio = document.getElementById('mainAudio');
            document.getElementById('nowPlaying').innerText = "Vibe: " + name;
            audio.src = url;
            audio.play();
        }

        function updateTime() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
