<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwitiya's Personal Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.8s ease-in-out;
            padding: 20px;
        }

        /* THEME BACKGROUNDS - KEPT EXACTLY THE SAME */
        body.cute-mode { 
            background-image: url('https://images.unsplash.com/photo-1592194996308-7b43878e84a6?q=80&w=2574&auto=format&fit=crop'); 
            color: #ff69b4;
        }
        body.classy-mode { 
            background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2670&auto=format&fit=crop'); 
            color: #d4af37;
        }
        body.dark-mode { 
            background-image: url('https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=2670&auto=format&fit=crop'); 
            color: #ffffff;
        }

        /* 3D GLASS CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 50px 100px rgba(0,0,0,0.4);
            padding: 30px;
            width: 100%; max-width: 850px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        .widget-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 10px;
        }

        h2 { font-size: 1.1rem; margin-bottom: 8px; }
        
        textarea {
            width: 100%; height: 80px; background: rgba(0,0,0,0.1);
            border: none; border-radius: 15px; padding: 10px; color: inherit;
            resize: none; font-family: inherit;
        }

        .btn {
            padding: 8px; border-radius: 50px; border: 1px solid currentColor;
            background: transparent; color: inherit; cursor: pointer; font-weight: 600;
            width: 100%; margin-top: 5px; transition: 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.2); }

        input {
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: inherit; outline: none;
        }

        /* FOCUS & GOALS STYLING */
        #timer { font-size: 1.5rem; font-weight: 600; margin: 5px 0; }
        .goal-item { display: flex; align-items: center; gap: 10px; margin-top: 5px; font-size: 0.9rem; }
        .goal-item input[type="checkbox"] { width: auto; }

        @media (max-width: 700px) { .glass-card { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="mainBody" class="cute-mode">

    <div class="glass-card">
        <div class="left-panel">
            <div class="widget-box">
                <h2>🕒 <span id="time">00:00:00</span></h2>
                <p>🌍 London: <span id="london">00:00</span></p>
                <p>📅 <span id="date">Loading...</span></p>
            </div>

            <div class="widget-box">
                <h2>📔 Digital Diary</h2>
                <textarea id="diary" placeholder="Write here..."></textarea>
                <button class="btn" onclick="saveDiary()">Save Diary</button>
            </div>

            <div class="widget-box">
                <h2>🎯 Focus Timer</h2>
                <div id="timer">25:00</div>
                <button class="btn" onclick="startTimer()">Start Focus Mode</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="widget-box">
                <h2>🌡️ Weather: 28°C</h2>
                <div style="display:flex; gap:5px;">
                    <button class="btn" onclick="setTheme('cute')">Cute</button>
                    <button class="btn" onclick="setTheme('classy')">Classy</button>
                    <button class="btn" onclick="setTheme('dark')">Dark</button>
                </div>
            </div>

            <div class="widget-box">
                <h2>🎵 Music System</h2>
                <input type="text" id="moodInput" placeholder="Enter vibe...">
                <button class="btn" onclick="handleMood()">Set Mood</button>
                <div id="musicPlayer"></div>
            </div>

            <div class="widget-box">
                <h2>✅ Today's Goals</h2>
                <div id="goalList">
                    <div class="goal-item"><input type="checkbox"> Study for JEE</div>
                    <div class="goal-item"><input type="checkbox"> Computer Science Prep</div>
                    <div class="goal-item"><input type="checkbox"> Web Dev Practice</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CLOCKS
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            document.getElementById('london').innerText = new Date().toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = new Date().toDateString();
        }, 1000);

        // THEMES
        function setTheme(type) {
            document.getElementById('mainBody').className = type + '-mode';
        }

        // MOOD & MUSIC
        function handleMood() {
            const val = document.getElementById('moodInput').value.toLowerCase();
            const player = document.getElementById('musicPlayer');
            if(val.includes("cute") || val.includes("taylor")) {
                setTheme('cute');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/1BxfuRmsmsOeoFLvC7L61S" frameBorder="0"></iframe>`;
            } else if(val.includes("classy") || val.includes("ed")) {
                setTheme('classy');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/0tgVpS3mghpBozvYvRPS6u" frameBorder="0"></iframe>`;
            } else if(val.includes("dark") || val.includes("arijit")) {
                setTheme('dark');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/5z9S9u0VvVfB4Wd9tPto2n" frameBorder="0"></iframe>`;
            }
        }

        // DIARY
        function saveDiary() {
            localStorage.setItem('userDiary', document.getElementById('diary').value);
            alert("Saved!");
        }

        // FOCUS TIMER LOGIC
        let timerInstance;
        function startTimer() {
            clearInterval(timerInstance);
            let time = 25 * 60;
            const display = document.getElementById('timer');
            timerInstance = setInterval(() => {
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (--time < 0) {
                    clearInterval(timerInstance);
                    alert("Focus session complete! Take a break.");
                }
            }, 1000);
        }

        window.onload = () => {
            document.getElementById('diary').value = localStorage.getItem('userDiary') || "";
        }
    </script>
</body>
</html>
