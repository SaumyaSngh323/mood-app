<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lively Moods | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.6s ease-in-out; }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #1a1a1a; /* Backup color */
        }

        /* --- STABLE PREMIUM BACKGROUNDS --- */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transform: scale(1.02);
        }

        /* Pink: Soft Aesthetic Silk */
        body.cute-theme .bg-overlay { background-image: url('https://wallpaperaccess.com/full/19065.jpg'); }
        body.cute-theme { color: #4d2626; }

        /* Classy: Premium Gold/Champagne Silk */
        body.classy-theme .bg-overlay { background-image: url('https://wallpaperaccess.com/full/4118337.jpg'); }
        body.classy-theme { color: #3d3025; }

        /* Dark: Midnight Aesthetic */
        body.dark-theme .bg-overlay { background-image: url('https://wallpaperaccess.com/full/1206385.jpg'); }
        body.dark-theme { color: #ffffff; }

        /* --- GLASSMOPRHISM CONTAINER --- */
        .glass-container {
            width: 550px; padding: 50px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 50px; margin-bottom: 25px; }

        .nav-minimal { position: fixed; top: 40px; display: flex; gap: 40px; }
        .nav-minimal button { background: none; border: none; font-family: 'Cormorant Garamond', serif; font-size: 22px; cursor: pointer; color: inherit; font-style: italic; }

        .btn-mood {
            padding: 10px 25px; margin: 5px; border-radius: 30px; border: 1px solid currentColor;
            background: rgba(255,255,255,0.1); color: inherit; cursor: pointer; font-weight: 600; text-transform: uppercase;
        }
        .btn-mood:hover { background: white; color: black; }

        /* Spotify Official Player */
        #player-wrap { margin-top: 30px; display: none; border-radius: 12px; overflow: hidden; }

        /* Diary Section */
        .diary-box {
            width: 100%; height: 250px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 20px; font-size: 20px; font-family: 'Cormorant Garamond', serif;
            color: inherit; outline: none; resize: none; margin-top: 20px;
        }

        .page { display: none; }
        .active { display: block; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="cute-theme">

    <div class="bg-overlay"></div>

    <div class="nav-minimal">
        <button onclick="showPage('home-page')">Home 🌸</button>
        <button onclick="showPage('diary-page')">Diary ✍️</button>
    </div>

    <div id="home-page" class="page active">
        <div class="glass-container">
            <h1>Lively Space</h1>
            <div style="margin-bottom: 20px;">
                <button class="btn-mood" onclick="setTheme('cute')">Pink Petals</button>
                <button class="btn-mood" onclick="setTheme('classy')">Premium Silk</button>
                <button class="btn-mood" onclick="setTheme('dark')">Midnight</button>
            </div>

            <input type="text" id="chatInput" style="width:70%; padding:10px; background:none; border:none; border-bottom:2px solid currentColor; color:inherit; font-size:18px; text-align:center;" placeholder="Say 'hii' for official music...">
            <br>
            <button onclick="checkChat()" style="margin-top:20px; padding:10px 30px; border-radius:20px; cursor:pointer; background:currentColor; color:white; border:none; font-weight:bold;">Enter</button>

            <div id="artist-list" style="display:none; margin-top:20px; gap:10px; justify-content:center;">
                <button class="btn-mood" onclick="playSong('taylor')">Taylor Swift</button>
                <button class="btn-mood" onclick="playSong('arijit')">Arijit Singh</button>
            </div>

            <div id="player-wrap">
                <iframe id="spotifyPlayer" src="" width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
            </div>
        </div>
    </div>

    <div id="diary-page" class="page">
        <div class="glass-container">
            <h1>Personal Notes</h1>
            <textarea class="diary-box" placeholder="Write your aesthetic thoughts..."></textarea>
            <button style="margin-top:20px; padding:12px 40px; border-radius:30px; border:none; background:currentColor; color:white; cursor:pointer; font-weight:bold;">Save Vibe</button>
        </div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setTheme(t) {
            document.body.className = t + '-theme';
        }

        function checkChat() {
            if(document.getElementById('chatInput').value.toLowerCase().includes('hii')) {
                document.getElementById('artist-list').style.display = 'flex';
            }
        }

        function playSong(artist) {
            const wrap = document.getElementById('player-wrap');
            const player = document.getElementById('spotifyPlayer');
            wrap.style.display = 'block';
            
            let id = "";
            if(artist === 'taylor') id = "1BxfuRmsvIuH06pKRuoa6p"; // Style
            if(artist === 'arijit') id = "5f98mYU689v9S9S6S9S"; // Example
            
            player.src = `https://open.spotify.com/embed/track/${id}`;
        }
    </script>
</body>
</html>
