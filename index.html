<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Aesthetic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 1s ease, color 0.5s ease;
            /* DEFAULT CUTE THEME */
            background-image: url('https://images.unsplash.com/photo-1635326444812-7067d51240a2?q=80&w=2574&auto=format&fit=crop');
            color: #333; 
        }

        /* DARK THEME TEXT OVERRIDE */
        body.dark-mode { color: #ffffff !important; }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            padding: 40px;
            width: 90%; max-width: 600px;
            text-align: center;
            transform: perspective(1000px) rotateX(1deg);
        }

        .widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .widget {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px; border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .theme-selector { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        .btn {
            padding: 10px 20px; border-radius: 50px; border: 1px solid currentColor;
            background: transparent; color: inherit; cursor: pointer; font-weight: 600;
        }
        .btn:hover { background: rgba(255,255,255,0.2); }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.2); color: inherit; outline: none; margin-bottom: 20px;
        }

        iframe { border-radius: 20px; margin-top: 15px; width: 100%; height: 80px; }
    </style>
</head>
<body id="mainBody">

    <div class="glass-card">
        <div class="widgets">
            <div class="widget">🕒 <span id="time">00:00:00</span></div>
            <div class="widget">🌡️ Delhi: 28°C</div>
            <div class="widget">🌍 London: <span id="london">00:00</span></div>
            <div class="widget">📅 March 26, 2026</div>
        </div>

        <h1>How was your day?</h1>
        
        <div class="theme-selector">
            <button class="btn" onclick="setTheme('cute')">Cute</button>
            <button class="btn" onclick="setTheme('classy')">Classy</button>
            <button class="btn" onclick="setTheme('dark')">Dark</button>
        </div>

        <input type="text" id="userInput" placeholder="Tell me your vibe...">
        <button class="btn" style="background: currentColor; color: #fff; border: none;" onclick="handleMood()">Update Vibe</button>

        <div id="musicBox"></div>
    </div>

    <script>
        // CLOCK
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            document.getElementById('london').innerText = new Date().toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // THEME LOGIC
        function setTheme(type) {
            const body = document.getElementById('mainBody');
            if(type === 'cute') {
                body.classList.remove('dark-mode');
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1635326444812-7067d51240a2?q=80&w=2574&auto=format&fit=crop')"; // 3D Bubbles
            } else if(type === 'classy') {
                body.classList.remove('dark-mode');
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2670&auto=format&fit=crop')"; // Premium Interior
            } else if(type === 'dark') {
                body.classList.add('dark-mode');
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=2670&auto=format&fit=crop')"; // High-end 3D Dark Geometry
            }
        }

        // MOOD LOGIC
        function handleMood() {
            const val = document.getElementById('userInput').value.toLowerCase();
            const music = document.getElementById('musicBox');
            if(val.includes("happy") || val.includes("cute")) {
                setTheme('cute');
                music.innerHTML = `<iframe src="http://googleusercontent.com/spotify.com/7" frameBorder="0"></iframe>`;
            } else if(val.includes("classy")) {
                setTheme('classy');
                music.innerHTML = `<iframe src="http://googleusercontent.com/spotify.com/8" frameBorder="0"></iframe>`;
            } else if(val.includes("dark") || val.includes("sad")) {
                setTheme('dark');
                music.innerHTML = `<iframe src="http://googleusercontent.com/spotify.com/9" frameBorder="0"></iframe>`;
            }
        }
    </script>
</body>
</html>
