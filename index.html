<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lively Mood Space 3D ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        /* --- 3D VISUAL THEMES --- */
        
        /* 1. CUTE: Ultra Pink 3D Blooms - Dark Text */
        body.cute-theme { 
            background-image: url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=2000&auto=format&fit=crop'); 
            color: #4a0e0e; 
        }
        body.cute-theme .glass-box { background: rgba(255, 255, 255, 0.4); border-color: rgba(255, 105, 180, 0.5); color: #4a0e0e; }
        body.cute-theme .navbar button, body.cute-theme h1, body.cute-theme .song-item { color: #4a0e0e; }

        /* 2. CLASSY: Premium 3D Golden Silk - Dark Text */
        body.classy-theme { 
            background-image: url('https://images.unsplash.com/photo-1513519245088-0e12902e35ca?q=80&w=2000&auto=format&fit=crop'); 
            color: #2c3e50; 
        }
        body.classy-theme .glass-box { background: rgba(255, 255, 255, 0.35); color: #2c3e50; }
        body.classy-theme .navbar button, body.classy-theme h1, body.classy-theme .song-item { color: #2c3e50; }

        /* 3. DARK: 3D Neon Midnight - White Text */
        body.dark-theme { 
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2000&auto=format&fit=crop'); 
            color: white; 
        }
        body.dark-theme .glass-box { background: rgba(0, 0, 0, 0.4); border-color: rgba(255, 255, 255, 0.1); color: white; }
        body.dark-theme .navbar button, body.dark-theme h1, body.dark-theme .song-item { color: white; }

        /* Navigation */
        .navbar {
            position: fixed; top: 0; width: 100%; padding: 25px;
            display: flex; justify-content: center; gap: 30px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); z-index: 1000;
        }
        .navbar button { background: none; border: none; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 19px; text-transform: uppercase; font-weight: 600; }

        /* Container */
        .page { display: none; width: 500px; animation: slideUp 1s ease; }
        .active { display: block; }

        .glass-box {
            backdrop-filter: blur(35px);
            padding: 50px; border-radius: 40px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 42px; margin-bottom: 20px; font-style: italic; }

        /* Playlist UI */
        .playlist-scroll {
            max-height: 220px; overflow-y: auto; margin-top: 25px; 
            background: rgba(0,0,0,0.05); border-radius: 20px; display: none; padding: 10px;
        }
        .song-item { 
            padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .play-btn { background: none; border: none; cursor: pointer; font-size: 15px; font-family: 'Poppins'; color: inherit; font-weight: 600; }
        .yt-link { font-size: 12px; color: #ff0000; text-decoration: none; font-weight: bold; }

        /* Weather UI */
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .weather-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }

        /* Bottom Player Bar */
        .player-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); 
            padding: 20px; color: white; text-align: center; backdrop-filter: blur(10px);
        }
        audio { width: 85%; height: 35px; filter: invert(1); margin-top: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark-theme"> <nav class="navbar">
        <button onclick="showPage('home')">Home 🌸</button>
        <button onclick="showPage('weather-page')">Weather ☁️</button>
        <button onclick="showPage('diary-page')">Diary ✍️</button>
    </nav>

    <div id="home" class="page active">
        <div class="glass-box">
            <h1>Lively Moods</h1>
            <div class="mood-btns">
                <button onclick="setTheme('cute')" style="padding:10px 20px; border-radius:20px; cursor:pointer; background:rgba(255,255,255,0.2); border:1px solid currentColor; color:inherit;">Cute Pink</button>
                <button onclick="setTheme('classy')" style="padding:10px 20px; border-radius:20px; cursor:pointer; background:rgba(255,255,255,0.2); border:1px solid currentColor; color:inherit;">Classy Gold</button>
                <button onclick="setTheme('dark')" style="padding:10px 20px; border-radius:20px; cursor:pointer; background:rgba(255,255,255,0.2); border:1px solid currentColor; color:inherit;">Dark Neon</button>
            </div>
            
            <div style="margin-top: 30px;">
                <input type="text" id="chatInput" placeholder="Type 'hii' for your playlist..." style="width:75%; padding:12px; background:none; border:none; border-bottom:2px solid currentColor; color:inherit; outline:none; font-size:16px;">
                <button onclick="handleChat()" style="padding:10px 20px; border-radius:20px; cursor:pointer; background:currentColor; color:white; border:none; font-weight:bold; margin-top:10px;">Talk</button>
                <p id="chatReply" style="margin-top:15px; font-weight:600;"></p>
                
                <div id="playlist" class="playlist-scroll">
                    <div class="song-item">
                        <button class="play-btn" onclick="playSong('Taylor Swift - Style', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">🎵 Style</button>
                        <a href="https://www.youtube.com/watch?v=-CmadmM5cOk" target="_blank" class="yt-link">WATCH YT</a>
                    </div>
                    <div class="song-item">
                        <button class="play-btn" onclick="playSong('Taylor Swift - Blank Space', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3')">🎵 Blank Space</button>
                        <a href="https://www.youtube.com/watch?v=e-ORhEE9VVg" target="_blank" class="yt-link">WATCH YT</a>
                    </div>
                    <div class="song-item">
                        <button class="play-btn" onclick="playSong('Ed Sheeran - Perfect', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3')">🎵 Perfect</button>
                        <a href="https://www.youtube.com/watch?v=2Vv-BfVoq4g" target="_blank" class="yt-link">WATCH YT</a>
                    </div>
                    <div class="song-item">
                        <button class="play-btn" onclick="playSong('Arijit Singh - Sitaare', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3')">🎵 Sitaare</button>
                        <a href="https://www.youtube.com/watch?v=QitS7v5rKts" target="_blank" class="yt-link">WATCH YT</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="weather-page" class="page">
        <div class="glass-box">
            <h1>Global Forecast</h1>
            <div id="clock" style="font-size:28px; margin-bottom:20px; font-weight:bold;"></div>
            <div class="weather-grid">
                <div class="weather-card"><b>Lucknow, IN</b><br>🌡️ 34°C <br>☀️ Summer Heat</div>
                <div class="weather-card"><b>London, UK</b><br>🌡️ 10°C <br>🌧️ Rainy Vibe</div>
                <div class="weather-card"><b>New York, US</b><br>🌡️ 16°C <br>☁️ Windy City</div>
                <div class="weather-card"><b>Paris, FR</b><br>🌡️ 14°C <br>🌬️ Classy Breeze</div>
            </div>
        </div>
    </div>

    <div id="diary-page" class="page">
        <div class="glass-box">
            <h1>Dear Diary...</h1>
            <textarea id="diaryInput" placeholder="Write your heart out here..."></textarea>
            <button onclick="alert('Entry Saved! ✨')" style="margin-top:20px; padding:12px 30px; border-radius:25px; cursor:pointer; background:currentColor; color:white; border:none; font-weight:bold;">Save Day</button>
        </div>
    </div>

    <div class="player-bar">
        <span id="nowPlaying">Select a song to start the vibe...</span><br>
        <audio id="mainAudio" controls></audio>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setTheme(theme) {
            document.body.className = theme + '-theme';
        }

        function handleChat() {
            const input = document.getElementById('chatInput').value.toLowerCase();
            const reply = document.getElementById('chatReply');
            const list = document.getElementById('playlist');

            if (input.includes('hii') || input.includes('hello')) {
                reply.innerText = "Hey! Ready for some music? Click a song below or Watch on YouTube. ✨";
                list.style.display = "block";
            } else {
                reply.innerText = "I'm listening to your energy...";
                list.style.display = "none";
            }
        }

        function playSong(name, url) {
            const audio = document.getElementById('mainAudio');
            document.getElementById('nowPlaying').innerText = "Now Playing: " + name;
            audio.src = url;
            audio.play();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
