<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lively Moods 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        /* --- IMMERSIVE 3D BACKGROUNDS --- */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transform: scale(1.1); filter: blur(2px);
        }

        /* 1. CUTE: Deep Aesthetic Pink (Like your 2nd image) */
        body.cute-theme .bg-overlay { 
            background-image: url('https://images.unsplash.com/photo-1528459105426-b92368940842?q=80&w=2000&auto=format&fit=crop'); 
            filter: saturate(1.5) brightness(0.9);
        }
        body.cute-theme { color: #5d1a1a; }
        body.cute-theme .glass-box { background: rgba(255, 182, 193, 0.4); border-color: rgba(255, 255, 255, 0.6); }

        /* 2. CLASSY: Premium 3D Gold & Marble */
        body.classy-theme .bg-overlay { 
            background-image: url('https://images.unsplash.com/photo-1513519245088-0e12902e35ca?q=80&w=2000&auto=format&fit=crop'); 
        }
        body.classy-theme { color: #2c3e50; }
        body.classy-theme .glass-box { background: rgba(255, 255, 255, 0.3); border-color: rgba(212, 175, 55, 0.4); }

        /* 3. DARK: Cyber 3D Midnight */
        body.dark-theme .bg-overlay { 
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2000&auto=format&fit=crop'); 
        }
        body.dark-theme { color: #ffffff; }
        body.dark-theme .glass-box { background: rgba(0, 0, 0, 0.6); border-color: rgba(255, 255, 255, 0.1); }

        /* Navbar Style */
        .navbar {
            position: fixed; top: 0; width: 100%; padding: 30px;
            display: flex; justify-content: center; gap: 40px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); z-index: 1000;
        }
        .navbar button { background: none; border: none; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 20px; color: inherit; font-weight: bold; letter-spacing: 1px; }

        /* 3D Glass Container */
        .page { display: none; width: 500px; perspective: 1000px; }
        .active { display: block; animation: float 4s ease-in-out infinite; }

        .glass-box {
            backdrop-filter: blur(40px); padding: 50px; border-radius: 50px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 40px 100px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.2);
            transform: rotateX(5deg);
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 45px; margin-bottom: 25px; }

        /* Interaction Elements */
        .mood-btn {
            padding: 12px 25px; margin: 10px; border-radius: 30px; border: 1px solid currentColor;
            background: rgba(255,255,255,0.1); color: inherit; cursor: pointer; font-weight: 600;
        }
        .mood-btn:hover { transform: scale(1.1) translateZ(20px); background: white; color: black; }

        .chat-input {
            width: 80%; padding: 15px; background: none; border: none;
            border-bottom: 2px solid currentColor; color: inherit; outline: none; margin-top: 30px; font-size: 18px;
        }

        /* Playlist & Weather UI */
        .playlist-area { display: none; margin-top: 25px; text-align: left; }
        .song-item { padding: 12px; border-radius: 15px; margin-bottom: 8px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .weather-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; font-size: 14px; }

        /* Bottom Player Bar */
        .player-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); 
            padding: 20px; color: white; text-align: center; backdrop-filter: blur(15px);
        }
        audio { width: 80%; height: 35px; filter: invert(1); margin-top: 10px; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="cute-theme"> <div class="bg-overlay"></div>

    <nav class="navbar">
        <button onclick="showPage('home')">Home 🌸</button>
        <button onclick="showPage('weather-page')">Weather ☁️</button>
        <button onclick="showPage('diary-page')">Diary ✍️</button>
    </nav>

    <div id="home" class="page active">
        <div class="glass-box">
            <h1>Lively Moods</h1>
            <div class="mood-btns">
                <button class="mood-btn" onclick="setTheme('cute')">Cute Pink 🌸</button>
                <button class="mood-btn" onclick="setTheme('classy')">Classy Gold 🥂</button>
                <button class="mood-btn" onclick="setTheme('dark')">Dark 3D 🌑</button>
            </div>
            
            <input type="text" id="chatInput" class="chat-input" placeholder="Type 'hii' for your vibe...">
            <button onclick="handleChat()" style="margin-top:15px; background:currentColor; color:white; border:none; padding:10px 25px; border-radius:30px; cursor:pointer; font-weight:bold;">Talk</button>
            
            <p id="chatReply" style="margin-top:15px; font-weight:bold;"></p>

            <div id="playlist" class="playlist-area">
                <div class="song-item" onclick="playSong('Taylor Swift - Style', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">
                    <span>🎵 Style</span> <a href="https://www.youtube.com/watch?v=-CmadmM5cOk" target="_blank" style="color:#ff0000; font-size:12px; text-decoration:none;">YT LINK</a>
                </div>
                <div class="song-item" onclick="playSong('Ed Sheeran - Perfect', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3')">
                    <span>🎵 Perfect</span> <a href="https://www.youtube.com/watch?v=2Vv-BfVoq4g" target="_blank" style="color:#ff0000; font-size:12px; text-decoration:none;">YT LINK</a>
                </div>
            </div>
        </div>
    </div>

    <div id="weather-page" class="page">
        <div class="glass-box">
            <h1>Lively Forecast</h1>
            <h2 id="clock" style="margin-bottom:20px;"></h2>
            <div class="weather-grid">
                <div class="weather-card"><b>Lucknow</b><br>🌡️ 34°C <br>☀️ Sunny Summer</div>
                <div class="weather-card"><b>London</b><br>🌡️ 12°C <br>🌧️ Rainy Vibe</div>
            </div>
        </div>
    </div>

    <div id="diary-page" class="page">
        <div class="glass-box">
            <h1>Dear Diary...</h1>
            <textarea id="diaryInput" placeholder="How was your day spent?" style="width:100%; height:180px; background:none; border:1px solid currentColor; color:inherit; border-radius:20px; padding:20px; font-size:18px; font-family:'Cormorant Garamond';"></textarea>
            <button onclick="alert('Locked in your heart! ✨')" style="margin-top:20px; background:currentColor; color:white; border:none; padding:12px 30px; border-radius:30px; cursor:pointer;">Save Day</button>
        </div>
    </div>

    <div class="player-bar">
        <span id="nowPlaying">Vibe is loading...</span><br>
        <audio id="mainAudio" controls></audio>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setTheme(theme) {
            document.body.className = theme + '-theme';
        }

        function handleChat() {
            const input = document.getElementById('chatInput').value.toLowerCase();
            const reply = document.getElementById('chatReply');
            const list = document.getElementById('playlist');
            if (input.includes('hii')) {
                reply.innerText = "Hey welcome here would you like to listen song then list of taylor swift song and ed shreen song list come sthen";
                list.style.display = "block";
            }
        }

        function playSong(name, url) {
            const audio = document.getElementById('mainAudio');
            document.getElementById('nowPlaying').innerText = "Playing: " + name;
            audio.src = url;
            audio.play();
        }

        function updateTime() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
