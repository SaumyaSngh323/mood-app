<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwitiya's Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            transition: all 0.8s ease-in-out;
            /* DEFAULT CUTE VIBE */
            background-color: #ffdef2; 
            background-image: url('https://images.unsplash.com/photo-1635326444812-7067d51240a2?q=80&w=2574&auto=format&fit=crop');
            color: #444;
        }

        /* HARD OVERRIDE FOR DARK THEME */
        body.dark-mode {
            background-color: #0a0a0a !important;
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2670&auto=format&fit=crop') !important;
            color: #ffffff !important;
        }

        /* HARD OVERRIDE FOR CLASSY (PREMIUM RICH) */
        body.classy-mode {
            background-color: #1a1a1a !important;
            background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2670&auto=format&fit=crop') !important;
            color: #d4af37 !important; /* Gold text */
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 50px 100px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.1);
            padding: 50px;
            width: 90%; max-width: 600px;
            text-align: center;
            /* 3D TILT EFFECT */
            transform: perspective(1000px) rotateX(2deg);
        }

        .widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .widget {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
            color: inherit;
        }

        .theme-selector { margin: 25px 0; display: flex; justify-content: center; gap: 15px; }
        .btn {
            padding: 12px 25px; border-radius: 50px; border: 2px solid currentColor;
            background: transparent; color: inherit; cursor: pointer; font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: white; color: black; transform: scale(1.1); }

        input {
            width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255, 255, 255, 0.1); color: inherit; outline: none; margin-bottom: 10px;
            font-size: 1rem;
        }

        #musicPlayer { margin-top: 25px; border-radius: 20px; overflow: hidden; height: 160px; }
    </style>
</head>
<body id="mainBody">

    <div class="glass-card">
        <div class="widgets">
            <div class="widget">🕒 <span id="time">00:00:00</span></div>
            <div class="widget">☁️ Delhi: 28°C</div>
            <div class="widget">🌍 London: <span id="london">00:00</span></div>
            <div class="widget">📅 March 26, 2026</div>
        </div>

        <h1>How was your day?</h1>
        
        <div class="theme-selector">
            <button class="btn" onclick="setTheme('cute')">Cute Bubbles</button>
            <button class="btn" onclick="setTheme('classy')">Premium Rich</button>
            <button class="btn" onclick="setTheme('dark')">Night Mode</button>
        </div>

        <input type="text" id="userInput" placeholder="I'm feeling happy / classy / sad...">
        <button class="btn" style="background: white; color: black; border: none; width: 100%;" onclick="handleMood()">Update Vibe</button>

        <div id="musicPlayer"></div>
    </div>

    <script>
        // LIVE CLOCKS
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString();
            document.getElementById('london').innerText = new Date().toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // THEME ENGINE
        function setTheme(type) {
            const body = document.getElementById('mainBody');
            body.classList.remove('dark-mode', 'classy-mode');

            if(type === 'cute') {
                // Background stays as default (bubbles)
            } else if(type === 'classy') {
                body.classList.add('classy-mode');
            } else if(type === 'dark') {
                body.classList.add('dark-mode');
            }
        }

        // MOOD ENGINE
        function handleMood() {
            const val = document.getElementById('userInput').value.toLowerCase();
            const player = document.getElementById('musicPlayer');
            
            if(val.includes("happy") || val.includes("cute")) {
                setTheme('cute');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/1BxfuRmsmsOeoFLvC7L61S" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
            } else if(val.includes("classy") || val.includes("rich")) {
                setTheme('classy');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/0tgVpS3mghpBozvYvRPS6u" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
            } else if(val.includes("dark") || val.includes("sad")) {
                setTheme('dark');
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/5z9S9u0VvVfB4Wd9tPto2n" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
            }
        }
    </script>
</body>
</html>
