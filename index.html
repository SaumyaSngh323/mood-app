<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adwitiya's Aesthetic Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* CSS - THE VISUALS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 1s ease-in-out;
            background-size: cover;
            background-position: center;
            /* DEFAULT THEME (CUTE) */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop'); 
        }

        /* NAVIGATION BAR */
        .glass-nav {
            position: fixed; top: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; gap: 30px;
            z-index: 100;
        }
        .glass-nav a { color: white; text-decoration: none; font-weight: 300; }

        /* THE MAIN 3D CARD */
        .mood-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            width: 90%; max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: white;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px; border-radius: 10px; color: white;
            width: 100%; margin: 20px 0; outline: none;
        }

        .glow-btn {
            background: white; border: none; padding: 12px 30px;
            border-radius: 10px; cursor: pointer; font-weight: 600;
            transition: 0.3s;
        }
        .glow-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.6); }

        #musicPlayer { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="glass-nav">
        <a href="#">Goals</a>
        <a href="#">Diary</a>
        <a href="#">Weather</a>
    </div>

    <div class="mood-container">
        <h1>How was your day?</h1>
        <p>Type "cute", "classy", or "dark" to change the vibe.</p>
        
        <div class="input-group">
            <input type="text" id="moodInput" placeholder="Tell me your vibe...">
            <button onclick="updateMood()" class="glow-btn">Set the Mood</button>
        </div>
        
        <h3 id="responseMsg"></h3>
        <div id="musicPlayer"></div>
    </div>

    <script>
        // JAVASCRIPT - THE BRAIN
        function updateMood() {
            const val = document.getElementById('moodInput').value.toLowerCase();
            const body = document.body;
            const msg = document.getElementById('responseMsg');
            const player = document.getElementById('musicPlayer');

            if (val.includes("cute")) {
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2670&auto=format&fit=crop')"; // 3D Pink Abstract
                msg.innerText = "So cute! Enjoy Taylor Swift. ✨";
                player.innerHTML = `<iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/1BxfuRmsmsOeoFLvC7L61S?utm_source=generator" width="100%" height="152" frameBorder="0" allow="autoplay; encrypted-media;"></iframe>`;

            } else if (val.includes("classy")) {
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1506318137071-a8e063b4bc09?q=80&w=2670&auto=format&fit=crop')"; // Premium Dark Gold/Silk
                msg.innerText = "Stay classy. Here is Ed Sheeran for you. 🍷";
                player.innerHTML = `<iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0tgVpS3mghpBozvYvRPS6u?utm_source=generator" width="100%" height="152" frameBorder="0" allow="autoplay; encrypted-media;"></iframe>`;

            } else if (val.includes("dark")) {
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=2574&auto=format&fit=crop')"; // 3D Dark Moody Mountain
                msg.innerText = "Embracing the dark... 🌙";
                player.innerHTML = `<iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/5z9S9u0VvVfB4Wd9tPto2n?utm_source=generator" width="100%" height="152" frameBorder="0" allow="autoplay; encrypted-media;"></iframe>`;
            } else {
                msg.innerText = "I don't know that vibe yet! Try 'cute', 'classy', or 'dark'.";
            }
        }
    </script>
</body>
</html>
