<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lively Moods | Official Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.5s ease; }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #111;
        }

        /* --- THEMES --- */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; filter: brightness(0.7);
        }

        /* Pink Theme */
        body.cute-theme .bg-overlay { background-image: url('https://images.unsplash.com/photo-1518131359043-409fde1fa9e3?q=80&w=2000'); }
        body.cute-theme { color: #4d2626; }

        /* Premium Silk Theme */
        body.classy-theme .bg-overlay { background-image: url('https://images.unsplash.com/photo-1513519245088-0e12902e35ca?q=80&w=2000'); }
        body.classy-theme { color: #3d3025; }

        /* Midnight Sky Theme */
        body.dark-theme .bg-overlay { background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000'); }
        body.dark-theme { color: #ffffff; }

        /* --- GLASSMOPRHISM BOX --- */
        .glass-box {
            width: 90%; max-width: 600px; padding: 40px; border-radius: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 100px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { font-family: 'Cormorant+Garamond', serif; font-size: 45px; margin-bottom: 20px; font-weight: 600; }

        .nav { position: fixed; top: 30px; display: flex; gap: 30px; z-index: 100; }
        .nav button { background: none; border: none; cursor: pointer; color: inherit; font-size: 20px; font-family: 'Cormorant+Garamond', serif; font-style: italic; }

        .btn {
            padding: 10px 20px; margin: 5px; border-radius: 30px; border: 1px solid currentColor;
            background: rgba(255,255,255,0.05); color: inherit; cursor: pointer; font-weight: 600;
        }
        .btn:hover { background: white; color: black; }

        /* Spotify Player Fix */
        #music-box { display: none; margin-top: 25px; border-radius: 15px; overflow: hidden; }

        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="cute-theme">

    <div class="bg-overlay"></div>

    <nav class="nav">
        <button onclick="showPage('home')">Home 🌸</button>
        <button onclick="showPage('weather')">Weather ☁️</button>
        <button onclick="showPage('diary')">Diary ✍️</button>
    </nav>

    <div id="home" class="page active">
        <div class="glass-box">
            <h1>Lively Space</h1>
            <div style="margin-bottom: 20px;">
                <button class="btn" onclick="setTheme('cute')">Pink Petals</button>
                <button class="btn" onclick="setTheme('classy')">Premium Silk</button>
                <button class="btn" onclick="setTheme('dark')">Midnight</button>
            </div>

            <input type="text" id="chatInput" style="width:70%; padding:10px; background:none; border:none; border-bottom:2px solid currentColor; color:inherit; font-size:18px; text-align:center;" placeholder="Whisper 'hii'...">
            <br>
            <button onclick="handleHii()" class="btn" style="margin-top:15px;">Reveal Music</button>

            <div id="music-box">
                <p style="margin-bottom:10px; font-style:italic;">Official Artist Track:</p>
                <div id="spotify-player"></div>
            </div>
        </div>
    </div>

    <div id="weather" class="page">
        <div class="glass-box">
            <h1>Aesthetic Forecast</h1>
            <h2 id="time" style="font-size:35px; letter-spacing:5px;"></h2>
            <div style="margin-top:20px; text-align:left; background:rgba(0,0,0,0.1); padding:20px; border-radius:20px;">
                <p><b>Location:</b> Mumbai</p>
                <p><b>Temp:</b> 28°C</p>
                <p><b>Vibe:</b> Classy & Sunny</p>
            </div>
        </div>
    </div>

    <div id="diary" class="page">
        <div class="glass-box">
            <h1>Private Journal</h1>
            <textarea style="width:100%; height:200px; background:none; border:1px solid rgba(255,255,255,0.2); border-radius:20px; color:inherit; padding:15px; font-family:serif; font-size:20px; outline:none;" placeholder="Write your aesthetic thoughts..."></textarea>
            <button class="btn" style="margin-top:15px;">Lock Entry</button>
        </div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setTheme(t) {
            document.body.className = t + '-theme';
        }

        function handleHii() {
            const input = document.getElementById('chatInput').value.toLowerCase();
            if(input.includes('hii')) {
                document.getElementById('music-box').style.display = 'block';
                // Using the official Spotify embed URL format to prevent "Page Not Found"
                document.getElementById('spotify-player').innerHTML = `
                    <iframe src="https://open.spotify.com/embed/track/1BxfuRmsvIuH06pKRuoa6p?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
                `;
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
