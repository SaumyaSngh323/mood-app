<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwitiya's Aesthetic Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.8s ease-in-out;
            /* CUTE FALLBACK COLOR */
            background-color: #ffd1dc; 
            color: #444;
        }

        /* CUTE THEME (3D Pastel Bubbles) */
        body.cute-mode {
            background-image: url('https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=2574&auto=format&fit=crop') !important;
            color: #ff4d94 !important;
        }

        /* DARK THEME (3D Obsidian) */
        body.dark-mode {
            background-color: #0a0a0a !important;
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2670&auto=format&fit=crop') !important;
            color: #ffffff !important;
        }

        /* CLASSY THEME (Premium Rich) */
        body.classy-mode {
            background-color: #1a1a1a !important;
            background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2670&auto=format&fit=crop') !important;
            color: #d4af37 !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
            padding: 40px;
            width: 90%; max-width: 550px;
            text-align: center;
            transform: perspective(1000px) rotateX(1deg);
        }

        .widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .widget {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
        }

        .theme-selector { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        .btn {
            padding: 10px 18px; border-radius: 50px; border: 2px solid currentColor;
            background: transparent; color: inherit; cursor: pointer; font-weight: 600;
        }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255, 255, 255, 0.1); color: inherit; outline: none; margin-bottom: 15px;
        }

        #music { margin-top: 15px; border-radius: 20px; overflow: hidden; height: 80px; }
    </style>
</head>
<body id="mainBody" class="cute-mode"> <div class="glass-card">
        <div class="widgets">
            <div class="widget">🕒 <span id="time">00:00:00</span></div>
            <div class="widget">🌡️ Delhi: 28°C</div>
            <div class="widget">🌍 London: <span id="london">00:00</span></div>
            <div class="widget">📅 Mar 26, 2026</div>
        </div>

        <h1>Aesthetic Hub</h1>
        
        <div class="theme-selector">
            <button class="btn" onclick="setTheme('cute')">Cute</button>
            <button class="btn" onclick="setTheme('classy')">Classy</button>
            <button class="btn" onclick="setTheme('dark')">Dark</button>
        </div>

        <input type="text" id="userInput" placeholder="How's the vibe today?">
        <button class="btn" style="background: white; color: black; border: none; width: 100%;" onclick="handleMood()">Update Vibe</button>

        <div id="music"></div>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            document.getElementById('london').innerText = new Date().toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function setTheme(type) {
            const body = document.getElementById('mainBody');
            body.classList.remove('cute-mode', 'dark-mode', 'classy-mode');
            body.classList.add(type + '-mode');
        }

        function handleMood() {
            const val = document.getElementById('userInput').value.toLowerCase();
            const music = document.getElementById('music');
            
            if(val.includes("cute") || val.includes("happy")) {
                setTheme('cute');
                music.innerHTML = `<iframe src="https://open.spotify.com/embed/track/1BxfuSpecial" width="100%" height="80" frameBorder="0" allow="encrypted-media"></iframe>`;
            } else if(val.includes("classy")) {
                setTheme('classy');
                music.innerHTML = `<iframe src="https://open.spotify.com/embed/track/2ClassySpecial" width="100%" height="80" frameBorder="0" allow="encrypted-media"></iframe>`;
            } else if(val.includes("dark")) {
                setTheme('dark');
                music.innerHTML = `<iframe src="https://open.spotify.com/embed/track/3DarkSpecial" width="100%" height="80" frameBorder="0" allow="encrypted-media"></iframe>`;
            }
        }
    </script>
</body>
</html>
