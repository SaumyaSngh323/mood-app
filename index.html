<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lively Moods | Premium Artist Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.9s cubic-bezier(0.19, 1, 0.22, 1); }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #050505;
        }

        /* --- MESMERIZING LAYERED BACKGROUNDS --- */
        .premium-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transform: scale(1.1); filter: brightness(0.8);
        }

        /* Pink: 3D Aesthetic Florals */
        body.cute-theme .premium-bg { background-image: url('https://images.unsplash.com/photo-1518131359043-409fde1fa9e3?q=80&w=2000&auto=format&fit=crop'); }
        body.cute-theme { color: #3d1c1c; }
        body.cute-theme .glass-box { background: rgba(255, 235, 240, 0.35); border: 1px solid rgba(255,255,255,0.6); }

        /* Classy: Premium Deep Marble/Gold Architecture */
        body.classy-theme .premium-bg { background-image: url('https://images.unsplash.com/photo-1513519245088-0e12902e35ca?q=80&w=2000&auto=format&fit=crop'); }
        body.classy-theme { color: #2c241e; }
        body.classy-theme .glass-box { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(212, 175, 55, 0.4); }

        /* Dark: 3D Abstract Midnight Wave */
        body.dark-theme .premium-bg { background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop'); }
        body.dark-theme { color: #ffffff; }
        body.dark-theme .glass-box { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.15); }

        /* --- NAVIGATION --- */
        .navbar {
            position: fixed; top: 0; width: 100%; padding: 40px;
            display: flex; justify-content: center; gap: 60px;
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(30px); z-index: 1000;
        }
        .navbar button { background: none; border: none; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 22px; color: inherit; font-style: italic; letter-spacing: 2px; }

        /* --- PREMIUM UI --- */
        .page { display: none; width: 600px; perspective: 2000px; }
        .active { display: block; animation: smoothFade 1.5s ease; }

        .glass-box {
            backdrop-filter: blur(60px); padding: 50px; border-radius: 60px;
            text-align: center; box-shadow: 0 60px 150px rgba(0,0,0,0.6);
            transform: rotateX(2deg);
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 55px; margin-bottom: 20px; font-weight: 600; }

        .mood-btn {
            padding: 12px 28px; margin: 10px; border-radius: 40px; border: 1px solid currentColor;
            background: rgba(255,255,255,0.05); color: inherit; cursor: pointer; font-weight: 600; text-transform: uppercase;
        }
        .mood-btn:hover { background: white; color: black; transform: scale(1.05); }

        /* Official Music Embed Container */
        #music-container { margin-top: 30px; display: none; border-radius: 20px; overflow: hidden; height: 160px; }

        /* Diary Styling */
        .diary-journal {
            width: 100%; height: 280px; background: rgba(255,255,255,0.05);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            color: inherit; padding: 30px; font-size: 24px; font-family: 'Cormorant Garamond', serif;
            outline: none; resize: none; margin-top: 20px;
        }

        @keyframes smoothFade { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body class="cute-theme">

    <div class="premium-bg"></div>

    <nav class="navbar">
        <button onclick="showPage('home')">Home 🌸</button>
        <button onclick="showPage('weather-page')">Forecast ☁️</button>
        <button onclick="showPage('diary-page')">Diary ✍️</button>
    </nav>

    <div id="home" class="page active">
        <div class="glass-box">
            <h1>Lively Space</h1>
            <div class="mood-btns">
                <button class="mood-btn" onclick="setTheme('cute')">Pink Petals</button>
                <button class="mood-btn" onclick="setTheme('classy')">Classy Silk</button>
                <button class="mood-btn" onclick="setTheme('dark')">Midnight</button>
            </div>
            
            <input type="text" id="chatInput" style="width:80%; padding:15px; background:none; border:none; border-bottom:2px solid currentColor; color:inherit; text-align:center; font-size:20px; margin-top:30px;" placeholder="Say 'hii' for official tracks...">
            <button onclick="handleChat()" style="margin-top:20px; padding:10px 40px; border-radius:30px; cursor:pointer; background:currentColor; color:white; border:none; font-weight:bold;">Enter</button>
            
            <div id="music-container">
                <iframe id="spotifyPlayer" src="" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
            
            <div id="artist-choices" style="display:none; margin-top:20px; gap:10px; justify-content:center;">
                <button class="mood-btn" onclick="playArtist('taylor')">Taylor Swift</button>
                <button class="mood-btn" onclick="playArtist('ed')">Ed Sheeran</button>
                <button class="mood-btn" onclick="playArtist('arijit')">Arijit Singh</button>
            </div>
        </div>
    </div>

    <div id="diary-page" class="page">
        <div class="glass-box">
            <h1>Dear Heart...</h1>
            <textarea id="diaryInput" class="diary-journal" placeholder="Your aesthetic journey today..."></textarea>
            <button onclick="alert('Memory Locked! ✨')" style="margin-top:25px; padding:15px 45px; border-radius:40px; background:currentColor; color:white; border:none; font-weight:bold; cursor:pointer;">Seal Journal</button>
        </div>
    </div>

    <div id="weather-page" class="page">
        <div class="glass-box">
            <h1>Lucknow Forecast</h1>
            <h2 id="clock" style="font-size:40px; letter-spacing:8px; margin:20px 0;"></h2>
            <div style="background:rgba(255,255,255,0.1); padding:30px; border-radius:40px; text-align:left;">
                <p><b>Current Condition:</b> Summer Heat ☀️</p>
                <p><b>Temperature:</b> 34°C</p>
                <p style="margin-top:10px; font-style:italic;">Stay hydrated and keep the vibe classy.</p>
            </div>
        </div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setTheme(theme) {
            document.body.className = theme + '-theme';
        }

        function handleChat() {
            const input = document.getElementById('chatInput').value.toLowerCase();
            if (input.includes('hii')) {
                document.getElementById('artist-choices').style.display = "flex";
            }
        }

        function playArtist(artist) {
            const player = document.getElementById('spotifyPlayer');
            const container = document.getElementById('music-container');
            container.style.display = "block";
            
            let trackId = "";
            if (artist === 'taylor') trackId = "1BxfuRmsvIuH06pKRuoa6p"; // Style
            if (artist === 'ed') trackId = "0tgVpS96pBHTD6nmg96N0v";    // Perfect
            if (artist === 'arijit') trackId = "5f98mYU689v9S9S6S9S";   // Example Track
            
            player.src = `https://open.spotify.com/embed/track/${trackId}?utm_source=generator`;
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
